<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Hybrid Chat App</title>
        <link rel="stylesheet" href="css/home-chat.css">
    </head>

    <body>
        <div class="container">
            <div class="sidebar">
                <div class="sidebar-title">
                    <h2>Chats</h2>
                    <button id="refreshBtn" title="Refresh peer list">&#8635</button>
                </div>

                <p class="small-label">Online peers</p>
                <div id="userList"></div>

                <p class="small-label channel-title">Channels</p>
                <div id="channelList"></div>
            </div>

            <div class="chat-area">
                <div class="chat-header">
                    <div>
                        <h3 id="chatTitle">Select a peer to chat</h3>
                        <p id="notificationText">No new messages</p>
                    </div>
                    <button id="broadcastBtn">Broadcast</button>
                </div>

                <div class="chat-body" id="chatBody">
                    <div class="empty-state">Choose a peer on the left to start direct P2P chat.</div>
                </div>

                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="Type here...">
                    <button id="sendBtn">➤</button>
                </div>
            </div>

            <div class="profile">
                <img src="images/avatar1.jpg" class="profile-img" onerror="this.style.display='none'">
                <h3 id="profileName">No peer selected</h3>
                <p class="status" id="profileStatus">● Waiting</p>

                <div class="info">
                    <p id="currentUserText">Current user: -</p>
                    <p id="peerAddress">Peer address: -</p>
                    <p>Mode: Client-server discovery + P2P message delivery</p>
                </div>

                <button class="block-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <script src="js/home-chat.js"></script>
    </body>
</html>
